<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GTA San Andreas Web Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Arial Black', sans-serif; }
        #hud { position: absolute; top: 15px; right: 15px; color: #5eff5e; font-size: 24px; text-align: right; text-shadow: 2px 2px #000; pointer-events: none; }
        #wanted { color: #ffff00; font-size: 20px; letter-spacing: 2px; }
        #mission-msg { position: absolute; bottom: 120px; width: 100%; text-align: center; color: #ffff00; font-size: 18px; text-shadow: 2px 2px #000; }
        
        /* Controles Táctiles */
        .ctrl { position: absolute; width: 65px; height: 65px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; color: #fff; display: flex; justify-content: center; align-items: center; user-select: none; }
        #joy-base { bottom: 40px; left: 40px; width: 110px; height: 110px; border-color: rgba(255,255,255,0.4); border-radius: 50%; position: absolute; border: 2px solid #fff; }
        #joy-knob { position: absolute; width: 50px; height: 50px; background: #fff; border-radius: 50%; left: 30px; top: 30px; }
        #btn-f { bottom: 120px; right: 30px; background: rgba(0,200,255,0.5); font-size: 10px; }
        #btn-shoot { bottom: 40px; right: 30px; background: rgba(255,0,0,0.5); font-size: 24px; }
    </style>
</head>
<body>
    <div id="hud">
        <div id="money">$00005000</div>
        <div id="wanted">★★☆☆☆☆</div>
        <div style="color: #ff3333;">❤❤❤❤❤❤</div>
    </div>
    <div id="mission-msg">MISIÓN: ROBA EL VEHÍCULO VERDE</div>

    <div id="joy-base"><div id="joy-knob"></div></div>
    <div id="btn-f" class="ctrl">ENTRAR (F)</div>
    <div id="btn-shoot" class="ctrl">🔫</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player, clock;
        let cars = [], npcs = [], bullets = [];
        let currentVehicle = null, isDriving = false;
        let moveState = { f:0, b:0, r:0, l:0 };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(50, 100, 50);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x606060));

            // Ciudad
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x333333}));
            ground.rotation.x = -Math.PI/2;
            scene.add(ground);

            // CJ
            player = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.8, 0.4), new THREE.MeshStandardMaterial({color: 0x4b3621}));
            body.position.y = 0.9;
            player.add(body);
            scene.add(player);

            // Vehículos
            for(let i=0; i<3; i++) {
                let car = new THREE.Group();
                let cBody = new THREE.Mesh(new THREE.BoxGeometry(2, 1.2, 4), new THREE.MeshStandardMaterial({color: i==0 ? 0x00ff00 : 0x0000ff}));
                cBody.position.y = 0.6;
                car.add(cBody);
                car.position.set(10, 0, -15 * (i+1));
                scene.add(car);
                cars.push(car);
            }

            setupControls();
            animate();
        }

        function toggleVehicle() {
            if(isDriving) {
                isDriving = false;
                player.visible = true;
                player.position.copy(currentVehicle.position).add(new THREE.Vector3(3, 0, 0));
                currentVehicle = null;
                document.getElementById('btn-f').innerHTML = "ENTRAR (F)";
            } else {
                cars.forEach(car => {
                    if(player.position.distanceTo(car.position) < 5) {
                        currentVehicle = car;
                        isDriving = true;
                        player.visible = false;
                        document.getElementById('btn-f').innerHTML = "SALIR (F)";
                        document.getElementById('mission-msg').innerHTML = "CONDUCIENDO: VE AL CENTRO";
                    }
                });
            }
        }

        function setupControls() {
            // Teclado PC
            window.addEventListener('keydown', (e) => {
                const k = e.key.toLowerCase();
                if(k === 'w') moveState.f = 1; if(k === 's') moveState.b = 1;
                if(k === 'a') moveState.l = 1; if(k === 'd') moveState.r = 1;
                if(k === 'f') toggleVehicle();
            });
            window.addEventListener('keyup', (e) => {
                const k = e.key.toLowerCase();
                if(k === 'w') moveState.f = 0; if(k === 's') moveState.b = 0;
                if(k === 'a') moveState.l = 0; if(k === 'd') moveState.r = 0;
            });

            // Touch Celular
            const knob = document.getElementById('joy-knob');
            const base = document.getElementById('joy-base');
            base.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                const r = base.getBoundingClientRect();
                const x = (t.clientX - r.left - 55)/55;
                const y = (t.clientY - r.top - 55)/55;
                moveState.f = y < -0.2 ? 1 : 0;
                moveState.b = y > 0.2 ? 1 : 0;
                moveState.l = x < -0.2 ? 1 : 0;
                moveState.r = x > 0.2 ? 1 : 0;
                knob.style.transform = `translate(${x*30}px, ${y*30}px)`;
            });
            base.addEventListener('touchend', () => {
                moveState = {f:0, b:0, l:0, r:0};
                knob.style.transform = `translate(0,0)`;
            });
            document.getElementById('btn-f').addEventListener('touchstart', (e) => { e.preventDefault(); toggleVehicle(); });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(isDriving) {
                if(moveState.f) currentVehicle.translateZ(0.4);
                if(moveState.b) currentVehicle.translateZ(-0.2);
                if(moveState.l) currentVehicle.rotation.y += 0.03;
                if(moveState.r) currentVehicle.rotation.y -= 0.03;
                camera.position.lerp(new THREE.Vector3(0, 5, -10).applyMatrix4(currentVehicle.matrixWorld), 0.1);
                camera.lookAt(currentVehicle.position);
            } else {
                if(moveState.f) player.translateZ(0.15);
                if(moveState.b) player.translateZ(-0.1);
                if(moveState.l) player.rotation.y += 0.05;
                if(moveState.r) player.rotation.y -= 0.05;
                camera.position.lerp(new THREE.Vector3(0, 3, -6).applyMatrix4(player.matrixWorld), 0.1);
                camera.lookAt(player.position.x, player.position.y + 1, player.position.z);
            }
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
